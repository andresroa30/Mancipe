<!DOCTYPE html>
<html>
<head>
    <title>Seguimiento</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .cards-seguimiento {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card-btn {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }

        .card-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border-color: #2563eb;
        }

        .card-btn span {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }

        .card-btn p {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body class="app-body">

<div class="sidebar">
    <h2>CONSTRUCCIONES MANCIPE</h2>

    <a href="/dashboard">🏠 Panel</a>
    <a href="/busqueda">🔍 Búsqueda</a>
    <a href="/seguimiento" style="background:#2563eb; color:white;">📊 Seguimiento</a>
    <a href="/empleados">👥 Empleados</a>
    <a href="/logout">🚪 Salir</a>
</div>

<div class="container">

    <h1>📊 Seguimiento del Personal</h1>
    <p class="subtitulo">Control y gestión integral de ausencias, vacaciones y rotación</p>

    <div class="cards-seguimiento">

        <a href="/seguimiento/inasistencias" class="card-btn">
            <span>🚫</span>
            <p>Inasistencias</p>
        </a>

        <a href="/seguimiento/retirados" class="card-btn">
            <span>❌</span>
            <p>Retirados</p>
        </a>

        <a href="/seguimiento/vacaciones" class="card-btn">
            <span>🏖️</span>
            <p>Vacaciones</p>
        </a>

        <a href="/seguimiento/dotacion" class="card-btn">
            <span>🦺</span>
            <p>Dotación</p>
        </a>

    </div>

</div>

</body>
</html>
